name: Release

# Builds the macOS (.dmg) and Windows (tikpull-setup.exe) installers.
#
# - Push a version tag (e.g. `git tag v0.2.0 && git push --tags`) to build
#   both installers and publish them on a new GitHub Release.
# - Or trigger manually from the Actions tab ("Run workflow") to just build
#   and inspect the installers as workflow artifacts, without publishing a
#   release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS installer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -e ".[desktop]" pyinstaller

      - name: Build .app and .dmg
        run: |
          source .venv/bin/activate
          bash packaging/macos/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: tikpull-macos
          path: dist/tikpull.dmg

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\Activate.ps1
          pip install -e ".[desktop]" pyinstaller

      - name: Build tikpull.exe
        shell: pwsh
        run: |
          .venv\Scripts\Activate.ps1
          powershell -ExecutionPolicy Bypass -File packaging\windows\build.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}" -replace '^v', ''
          } else {
            "0.0.0-dev"
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" packaging\windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: tikpull-windows
          path: dist_installer/tikpull-setup.exe

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tikpull-macos/tikpull.dmg
            artifacts/tikpull-windows/tikpull-setup.exe
          generate_release_notes: true
