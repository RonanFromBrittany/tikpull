name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly published CVEs
    - cron: "0 8 * * 1"

jobs:

  # --- Static analysis with CodeQL ---
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # --- Dependency vulnerability scan with pip-audit ---
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies and export requirements
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          # Export only third-party dependencies (exclude tikpull itself)
          uv pip freeze | grep -v "^tikpull" > /tmp/requirements-audit.txt
          cat /tmp/requirements-audit.txt

      - name: Run pip-audit
        run: |
          source .venv/bin/activate
          pip install pip-audit
          pip-audit --strict -r /tmp/requirements-audit.txt
