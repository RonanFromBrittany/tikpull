name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly published CVEs
    - cron: "0 8 * * 1"

jobs:

  # --- Static analysis with CodeQL ---
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # --- Dependency vulnerability scan with pip-audit ---
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Write third-party requirements file
        run: |
          cat > /tmp/requirements-audit.txt << 'REQS'
          yt-dlp>=2024.1.1
          httpx>=0.27.0
          rich>=13.0.0
          fastapi>=0.111.0
          uvicorn>=0.30.0
          python-multipart>=0.0.9
          aiosqlite>=0.20.0
          REQS

      - name: Run pip-audit
        run: pip-audit --strict -r /tmp/requirements-audit.txt
