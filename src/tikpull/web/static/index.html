<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tikpull</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #fe2c55;
      --accent-hover: #e0193f;
      --text: #f1f1f1;
      --text-muted: #888;
      --success: #25c96e;
      --already: #4a9eff;
      --error: #fe2c55;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-muted); margin-top: 0.4rem; font-size: 0.95rem; }
    .admin-link { display: inline-block; margin-top: 0.5rem; color: var(--text-muted); font-size: 0.82rem; text-decoration: none; }
    .admin-link:hover { color: var(--text); }

    main {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-row { display: flex; gap: 0.6rem; }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(254,44,85,0.05);
    }

    .drop-zone input[type="file"] { display: none; }
    #batch-btn { margin-top: 0.8rem; width: 100%; }

    .progress-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.88rem;
      padding: 0.5rem 0.7rem;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .progress-item .status { font-size: 1rem; flex-shrink: 0; }
    .progress-item .url {
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .badge {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .badge.success  { background: rgba(37,201,110,0.15);  color: var(--success); }
    .badge.already  { background: rgba(74,158,255,0.15);  color: var(--already); }
    .badge.error    { background: rgba(254,44,85,0.15);   color: var(--error); }
    .badge.pending  { background: rgba(255,255,255,0.05); color: var(--text-muted); }

    .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

    .history-table th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 500;
      padding: 0.4rem 0.6rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .history-table td {
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .history-table td.url-cell {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-muted);
    }

    .history-table td.date-cell {
      white-space: nowrap;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .history-table td.file-cell {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.78rem;
    }

    .empty { color: var(--text-muted); font-size: 0.88rem; text-align: center; padding: 1rem 0; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .header-actions { display: flex; gap: 0.5rem; }

    .card-header h2 { margin-bottom: 0; }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 0.3rem 0.8rem;
    }

    .clear-btn:hover { background: var(--border); color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>tik<span>pull</span></h1>
  <p>Download videos from TikTok, YouTube, and Instagram</p>
  <a class="admin-link" href="/admin">⚙ Settings</a>
</header>

<main>

  <!-- Single URL download -->
  <div class="card">
    <h2>Single URL</h2>
    <div class="input-row">
      <input type="text" id="single-url" placeholder="TikTok, YouTube, or Instagram URL…" />
      <button id="single-btn" onclick="downloadSingle()">Download</button>
    </div>
    <div class="progress-list" id="single-progress"></div>
  </div>

  <!-- Batch download from file -->
  <div class="card">
    <h2>Batch — URL file</h2>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept=".txt" onchange="onFileSelected(this)">
      <span id="drop-label">Drop a .txt file here or click to select</span>
    </div>
    <button id="batch-btn" disabled onclick="downloadBatch()">Start batch</button>
    <div class="progress-list" id="batch-progress"></div>
  </div>

  <!-- Download history -->
  <div class="card">
    <div class="card-header">
      <h2>History</h2>
      <div class="header-actions">
        <button class="clear-btn" onclick="openFolder()">📂 Open folder</button>
        <button class="clear-btn" onclick="clearHistory()">Clear</button>
      </div>
    </div>
    <div id="history-container"><p class="empty">No downloads yet.</p></div>
  </div>

</main>

<script>
  let selectedFile = null;

  // Drag & drop handlers
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  function onFileSelected(input) {
    if (input.files[0]) setFile(input.files[0]);
  }

  function setFile(file) {
    selectedFile = file;
    document.getElementById('drop-label').textContent = `📄 ${file.name}`;
    document.getElementById('batch-btn').disabled = false;
  }

  // Format an ISO datetime string for display
  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'Z');
    return d.toLocaleString(undefined, {
      month: 'short', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // Build a progress item for a URL currently being downloaded
  function makeItem(url) {
    const div = document.createElement('div');
    div.className = 'progress-item';
    div.innerHTML = `
      <span class="status">⏳</span>
      <span class="url" title="${url}">${url}</span>
      <span class="badge pending">In progress…</span>
    `;
    return div;
  }

  // Build a progress item for a URL already marked as downloaded in the file
  function makeAlreadyItem(url) {
    const div = document.createElement('div');
    div.className = 'progress-item';
    div.innerHTML = `
      <span class="status">🔵</span>
      <span class="url" title="${url}">${url}</span>
      <span class="badge already">Already downloaded</span>
    `;
    return div;
  }

  // Update a progress item once its download completes
  function updateItem(item, success, detail) {
    item.querySelector('.status').textContent = success ? '✅' : '❌';
    const badge = item.querySelector('.badge');
    badge.className = 'badge ' + (success ? 'success' : 'error');
    badge.textContent = success ? (detail || 'OK') : (detail || 'Error');
  }

  // Consume an SSE stream and update the progress container in real time
  async function streamDownload(fetchPromise, progressContainer) {
    progressContainer.innerHTML = '';
    const items = {};

    const resp = await fetchPromise;
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();

      for (const part of parts) {
        if (!part.startsWith('data:')) continue;
        const evt = JSON.parse(part.slice(5).trim());

        if (evt.type === 'already_downloaded') {
          progressContainer.appendChild(makeAlreadyItem(evt.url));
        } else if (evt.type === 'progress') {
          const el = makeItem(evt.url);
          items[evt.idx] = el;
          progressContainer.appendChild(el);
        } else if (evt.type === 'result') {
          const el = items[evt.idx];
          if (el) {
            const detail = evt.success
              ? evt.output_path?.split('/').pop()
              : evt.error?.slice(0, 60);
            updateItem(el, evt.success, detail);
          }
          refreshHistory();
        }
      }
    }
  }

  // Download a single URL via SSE stream
  async function downloadSingle() {
    const url = document.getElementById('single-url').value.trim();
    if (!url) return;
    const btn = document.getElementById('single-btn');
    btn.disabled = true;

    await streamDownload(
      fetch('/api/download/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      }),
      document.getElementById('single-progress')
    );
    btn.disabled = false;
  }

  // Upload a URL file and download all active entries via SSE stream
  async function downloadBatch() {
    if (!selectedFile) return;
    const btn = document.getElementById('batch-btn');
    btn.disabled = true;

    const formData = new FormData();
    formData.append('file', selectedFile);

    await streamDownload(
      fetch('/api/download/batch', { method: 'POST', body: formData }),
      document.getElementById('batch-progress')
    );
    btn.disabled = false;
  }

  // Fetch and render the history table from the SQLite database
  async function refreshHistory() {
    const resp = await fetch('/api/history');
    const { history } = await resp.json();
    const container = document.getElementById('history-container');

    if (!history.length) {
      container.innerHTML = '<p class="empty">No downloads yet.</p>';
      return;
    }

    const rows = history.map(h => {
      const icon = h.status === 'already_downloaded' ? '🔵'
                 : h.status === 'success' ? '✅' : '❌';
      const resultCell = h.status === 'already_downloaded'
        ? `<span style="color:var(--already);font-size:0.78rem">Already downloaded</span>`
        : h.status === 'success'
          ? `<span style="color:var(--success)">${h.output_path?.split('/').pop() || '—'}</span>`
          : `<span style="color:var(--error)">${(h.error || '').slice(0, 50)}</span>`;

      return `
        <tr>
          <td>${icon}</td>
          <td class="url-cell" title="${h.url}">${h.url}</td>
          <td class="file-cell">${resultCell}</td>
          <td class="date-cell">${formatDate(h.downloaded_at)}</td>
        </tr>
      `;
    }).join('');

    container.innerHTML = `
      <table class="history-table">
        <thead>
          <tr>
            <th></th>
            <th>URL</th>
            <th>Result</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // Open the configured downloads folder in the OS file manager
  async function openFolder() {
    try {
      const resp = await fetch('/api/open-folder', { method: 'POST' });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        alert(`Could not open folder: ${err.detail || 'unknown error'}`);
      }
    } catch (e) {
      alert(`Could not open folder: ${e}`);
    }
  }

  // Clear all history from the database
  async function clearHistory() {
    await fetch('/api/history', { method: 'DELETE' });
    refreshHistory();
  }

  // Load history on page load
  refreshHistory();
</script>

</body>
</html>
